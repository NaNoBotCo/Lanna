  :root{

</style></head><body><script>window.__LANNA_BASE__="/";</script><script>
(function(){
  "use strict";
  // ---- Lanna Wiki static shim: run the dynamic viewer on a static host ----------
  // BASE lets the same build work at the domain root ('/') or under a project path
  // ('/Lanna/'). All static targets are resolved through S() so they land correctly.
  var BASE = (window.__LANNA_BASE__ || '/');
  if (BASE.charAt(BASE.length-1) !== '/') BASE += '/';
  function S(p){ return BASE + String(p).replace(/^\//,''); }
  var PLACE = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="260" height="150">'+
    '<rect width="100%" height="100%" fill="#eef2f1"/>'+
    '<text x="50%" y="50%" fill="#3a4a47" font-family="sans-serif" font-size="13" '+
    'text-anchor="middle" dominant-baseline="middle">raw scan — view at source</text></svg>');
  function art(s){ return String(s==null?'':s).replace(/[^A-Za-z0-9]+/g,'_'); }
  function jresp(o){ return new Response(JSON.stringify(o),
    {status:200, headers:{'Content-Type':'application/json; charset=utf-8'}}); }
  var NOARG = {
    '/api/overview':'/api/overview.json','/api/dashboard':'/api/dashboard.json',
    '/api/places':'/api/places.json','/api/lenses':'/api/lenses.json',
    '/api/vocab':'/api/vocab.json','/api/market':'/api/market.json',
    '/api/graph':'/api/graph.json','/api/articles':'/api/articles.json',
    '/api/status':'/api/status.json','/api/manuscripts':'/api/manuscripts.json',
    '/api/graph.jsonld':'/api/graph.jsonld','/api/graph.ttl':'/api/graph.ttl',
    '/api/diagrams':'/api/diagrams.json','/api/findings':'/api/findings.json',
    '/api/activity':'/api/activity.json',
    '/api/expedite':'/api/expedite.json','/api/wats':'/api/wats.json'
  };
  var _fetch = window.fetch ? window.fetch.bind(window) : function(u){return fetch(u);};

  var _docs=null;
  function loadDocs(){ if(_docs) return Promise.resolve(_docs);
    return _fetch(S('/api/searchdocs.json')).then(function(r){return r.json();})
      .then(function(d){_docs=d;return d;}).catch(function(){_docs=[];return [];}); }
  var _thes=null;
  function loadThes(){ if(_thes) return Promise.resolve(_thes);
    return _fetch(S('/api/thesaurus.json')).then(function(r){return r.json();})
      .then(function(t){_thes=t;return t;}).catch(function(){_thes={};return {};}); }
  // mirrors wiki.py _expand_token: query token -> OR-set of cross-language equivalents
  function expand(tok, thes){
    tok=(tok||'').toLowerCase();
    var members={}; members[tok]=1;
    if(tok.length<2) return Object.keys(members);
    for(var key in thes){
      if(tok===key || (tok.length>=3 && (tok.indexOf(key)>=0 || key.indexOf(tok)>=0))){
        var grp=thes[key]; for(var i=0;i<grp.length;i++) members[grp[i]]=1;
      }
    }
    return Object.keys(members);
  }
  function staticSearch(q){
    q=(q||'').trim(); var out={manuscripts:[],articles:[],query:q};
    if(!q) return Promise.resolve(jresp(out));
    return Promise.all([loadDocs(), loadThes()]).then(function(res){
      var docs=res[0], thes=res[1];
      var groups=q.toLowerCase().split(/\s+/).filter(Boolean)
                  .map(function(t){return expand(t, thes);}).filter(function(g){return g.length;});
      if(!groups.length) return jresp(out);
      var scored=[];
      for(var i=0;i<docs.length;i++){
        var d=docs[i], title=(d.ntitle||'').toLowerCase(), body=(d.nbody||'').toLowerCase();
        var ok=true, score=0, pos=null;
        for(var j=0;j<groups.length;j++){
          var g=groups[j], ghit=0;
          for(var m=0;m<g.length;m++){
            var tk=g[m]; if(!tk) continue;
            if(title.indexOf(tk)>=0) ghit+=12;
            var idx=body.indexOf(tk);
            if(idx>=0){ ghit+=Math.min(body.split(tk).length-1,6); if(pos===null||idx<pos)pos=idx; }
          }
          if(ghit===0){ok=false;break;} score+=ghit;
        }
        if(ok) scored.push([score,d,pos]);
      }
      scored.sort(function(a,b){return b[0]-a[0];});
      for(var k=0;k<scored.length;k++){
        var d2=scored[k][1], pos2=scored[k][2]==null?0:scored[k][2];
        var text=d2.nbody||d2.ntitle||'';
        var snip=text.substr(Math.max(0,pos2-60),200).replace(/\s+/g,' ').trim();
        if(d2.kind==='m'){ if(out.manuscripts.length<60)
          out.manuscripts.push({id:parseInt(d2.ref,10),label:d2.label,snippet:snip}); }
        else { if(out.articles.length<60)
          out.articles.push({key:d2.ref,label:d2.label,snippet:snip}); }
      }
      return jresp(out);
    });
  }

  var _scans=null;
  function loadScans(){ if(_scans) return Promise.resolve(_scans);
    return _fetch(S('/api/scans.all.json')).then(function(r){return r.json();})
      .then(function(d){_scans=d.scans||[];return _scans;}).catch(function(){_scans=[];return [];}); }

  // ---- IIIF on-demand images: /img?sha=&w= -> sized library IIIF URL ------------
  // We ship no scan bytes; a {sha -> IIIF url} map lets every page image load from
  // the originating library, resized via the IIIF size parameter. The <img> src
  // setter is synchronous, so images requested before the map arrives get the
  // placeholder and are re-resolved once it loads (IIIF_Q flush).
  var IIIF=null, IIIF_Q=[], IIIF_LOADING=false;
  function iiifSized(u,w){ w=w||1024;
    return String(u).replace('/full/full/0/default.jpg','/full/'+w+',/0/default.jpg'); }
  function flushIIIF(){ var q=IIIF_Q; IIIF_Q=[];
    for(var i=0;i<q.length;i++){ var it=q[i], u=IIIF[it.sha];
      if(u){ try{ desc.set.call(it.el, iiifSized(u,it.w)); }catch(e){} } } }
  // LAZY: the {sha -> IIIF url} map is ~2.6 MB and only pages that actually render
  // scan images (browse, gallery, manuscript detail) need it. Fetch it on the FIRST
  // /img?sha= request instead of on every page load, so image-free pages (home,
  // articles, findings, market, textbooks) pay zero bytes for it.
  function loadIIIF(){ if(IIIF) return Promise.resolve(IIIF);
    if(IIIF_LOADING) return Promise.resolve(null); IIIF_LOADING=true;
    return _fetch(S('/api/img-iiif.json')).then(function(r){return r.json();})
      .then(function(m){ IIIF=m||{}; flushIIIF(); return IIIF; })
      .catch(function(){ IIIF={}; flushIIIF(); return IIIF; }); }
  function scansSlice(sp){
    var midp=sp.get('mid'); var mid = midp?parseInt(midp,10):null;
    var offset=parseInt(sp.get('offset')||'0',10)||0;
    var limit=parseInt(sp.get('limit')||'120',10)||120;
    var onlyT=(sp.get('only')==='transcribed');
    return loadScans().then(function(all){
      var pool=all.filter(function(s){
        if(mid!==null && s.id!==mid) return false;
        if(onlyT && !s.transcribed) return false;
        return true;
      });
      return jresp({dbPresent:true, scans:pool.slice(offset,offset+limit),
                    offset:offset, limit:limit, total:pool.length});
    });
  }

  window.fetch = function(input, init){
    init = init || {};
    var url;
    try { url = new URL((typeof input==='string')?input:input.url, location.origin); }
    catch(e){ return _fetch(input, init); }
    if(url.origin !== location.origin) return _fetch(input, init);
    var method = (init.method || (typeof input!=='string' && input.method) || 'GET').toUpperCase();
    var p = url.pathname, sp = url.searchParams;
    if(method !== 'GET') return Promise.resolve(jresp({ok:false, readonly:true}));
    if(p==='/api/search') return staticSearch(sp.get('q'));
    if(p==='/api/gallery' && sp.get('source')==='scans') return scansSlice(sp);
    // analysis widgets: /api/w/<name> -> the dumped snapshot; geo.geojson is a real
    // file already, everything else gains a .json extension on disk.
    if(p.indexOf('/api/w/')===0){
      if(p.slice(-8)==='.geojson') return _fetch(S(p), {});
      return _fetch(S(p+'.json'), {});
    }
    if(NOARG[p]) return _fetch(S(NOARG[p]), {});
    if(p==='/api/manuscript') return _fetch(S('/api/manuscript/'+encodeURIComponent(sp.get('id'))+'.json'), {});
    if(p==='/api/article')    return _fetch(S('/api/article/'+art(sp.get('s'))+'.json'), {});
    if(p==='/api/gallery'){
      var src=sp.get('source');
      if(src==='scan-index') return _fetch(S('/api/gallery.scan-index.json'), {});
      return _fetch(S('/api/gallery.json'), {});
    }
    if(p==='/pimg') return _fetch(S('/pimg/'+sp.get('mid')+'/'+sp.get('n')+'.png'), {});
    return _fetch(input, init);
  };

  // internal navigation: app links are baked as root-absolute ('/browse', '/m?id=…').
  // Under a project subpath they must be re-rooted at BASE. A capture-phase click
  // handler does this for every link, however it was created.
  document.addEventListener('click', function(ev){
    if(ev.defaultPrevented || ev.button!==0 || ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.altKey) return;
    var a = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
    if(!a) return;
    if(a.target==='_blank') return;
    var href=a.getAttribute('href');
    if(!href || href.charAt(0)!=='/' || href.charAt(1)==='/') return;  // only root-absolute, not protocol-relative
    if(BASE!=='/' && href.indexOf(BASE)===0) return;                   // already re-rooted
    // '/read?id=N' is a query-string route the live wiki serves dynamically; a
    // static host can't route query strings, so the export ships it as a real
    // path instead (read/N/index.html) — rewrite the click to match.
    var rm = href.match(/^\/read\?id=(\d+)/);
    if(rm){ ev.preventDefault(); location.href = S('read/'+rm[1]+'/'); return; }
    // widget JSON download links point at '/api/w/<name>' (no extension); on disk
    // that snapshot is '<name>.json' — map the download to the real file.
    var wm = href.match(/^\/api\/w\/([a-z]+)$/);
    if(wm){ ev.preventDefault(); location.href = S('api/w/'+wm[1]+'.json'); return; }
    ev.preventDefault();
    location.href = S(href);
  }, true);

  // rewrite <img> src (Object.assign in el() sets the .src property, so this catches it)
  try {
    var proto=HTMLImageElement.prototype;
    var desc=Object.getOwnPropertyDescriptor(proto,'src');
    Object.defineProperty(proto,'src',{configurable:true,enumerable:true,
      get:function(){return desc.get.call(this);},
      set:function(v){
        try{
          var u=new URL(v, location.origin);
          if(u.origin===location.origin){
            if(u.pathname==='/pimg'){
              v=S('/pimg/'+u.searchParams.get('mid')+'/'+u.searchParams.get('n')+'.png');
            } else if(u.pathname==='/img'){
              var sha=u.searchParams.get('sha');
              var w=parseInt(u.searchParams.get('w')||'0',10)||0;
              if(sha && IIIF && IIIF[sha]){ v=iiifSized(IIIF[sha], w); }
              else if(sha && IIIF===null){ IIIF_Q.push({el:this, sha:sha, w:w}); v=PLACE; loadIIIF(); }
              else { v=PLACE; }
            }
          }
        }catch(e){}
        desc.set.call(this,v);
      }});
  } catch(e){}
})();
</script><header><div><h1>Wats of Chiang Mai</h1><p class=sub>The tradition standing up in the landscape &mdash; temples of the Lanna north, heritage-registered sites marked</p></div><nav><a href='/'>Overview</a><a href='/browse'>Browse</a><a href='/textbooks'>Textbooks</a><a href='/market'>Living Tradition</a><a href='/wats'>Wats</a><a href='/expedite'>St. Expedite</a><a href='/articles'>Profiles</a><a href='/diagrams'>Diagrams</a><a href='/findings'>Discoveries</a><a href='/activity'>Activity</a><a class=kofi href='/support'>&#9749; Support</a></nav></header><main id=main><p class=muted>Loading&hellip;</p></main><script>
const el=(t,p={},k=[])=>{const e=document.createElement(t);Object.assign(e,p);for(const c of [].concat(k))if(c!=null&&c!==false)e.append(c);return e;};
const BASE=(window.__LANNA_BASE__||'/');
let ALL=[],mode='all',q='',map=null,current=null;

// MapLibre is a separate cached asset, not inlined — ~780 kB has no business
// living inside the HTML of every page view.
function loadMapLib(){
  if(window.maplibregl)return Promise.resolve();
  return new Promise((res,rej)=>{
    const l=document.createElement('link');l.rel='stylesheet';l.href=BASE+'vendor/maplibre-gl.css';document.head.append(l);
    const s=document.createElement('script');s.src=BASE+'vendor/maplibre-gl.js';s.onload=()=>res();s.onerror=()=>rej(new Error('map library failed to load'));document.head.append(s);
  });
}
async function load(){let d;try{d=await (await fetch('/api/wats')).json();}catch(e){document.getElementById('main').textContent='Could not load the wat catalogue.';return;}
  window.__W=d;ALL=d.wats||[];
  if(!d.present||!ALL.length){document.getElementById('main').innerHTML='';document.getElementById('main').append(el('p',{className:'muted',textContent:'The wat catalogue has not been synced into this build yet.'}));return;}
  render();
  loadMapLib().then(initMap).catch(e=>{const h=document.getElementById('hero');if(h)h.innerHTML='<p class=muted style="padding:18px">Interactive map unavailable ('+e.message+'). The catalogue below still works.</p>';});
}
function chip(label,m){const a=el('a',{className:'wchip'+(mode===m?' on':'')});a.textContent=label;a.onclick=()=>{mode=m;render();syncMap();};return a;}
function visible(){return ALL.filter(w=>{
  if(mode==='heritage'&&!w.heritage)return false;
  if(mode==='photos'&&!(w.photos||[]).length)return false;
  if(q){const s=((w.name||'')+' '+(w.nameRoman||'')).toLowerCase();if(!s.includes(q))return false;}
  return true;});}

function render(){const d=window.__W,main=document.getElementById('main');main.textContent='';
  const hero=el('div',{className:'hero',id:'hero'});
  hero.append(el('div',{className:'mapwrap',id:'heromap'}));
  hero.append(el('div',{className:'heronote',id:'heronote',textContent:d.total.toLocaleString()+' temples'}));
  const lg=el('div',{className:'herolegend'});
  lg.append(el('b',{textContent:'Markers'}));
  lg.append(el('div',{className:'lg'},[el('span',{className:'sw h'}),el('span',{textContent:'Heritage-registered'})]));
  lg.append(el('div',{className:'lg'},[el('span',{className:'sw o'}),el('span',{textContent:'Wat (compiled, unvisited)'})]));
  if((d.sacred||[]).length)lg.append(el('div',{className:'lg'},[el('span',{className:'sw s'}),el('span',{textContent:'Sacred site (not a wat)'})]));
  hero.append(lg);
  main.append(hero);

  const intro=el('div',{className:'wintro'});
  intro.textContent=d.total.toLocaleString()+' temples mapped across the Lanna north, '+d.heritage+' registered as Thai historic sites, '+d.withPhotos+' with freely-licensed photography'+
    ((d.sacredTotal||0)?', plus '+d.sacredTotal+' notable places of spiritual significance that are not wats — city pillars, the sunken Lanna cities, sacred caves, mosques and monumental Buddha images':'')+
    '. Most records are machine-compiled and unvisited — they are leads into the landscape, not verified survey.';
  main.append(intro);

  const f=el('div',{className:'wfilter'});
  f.append(chip('All ('+ALL.length+')','all'));
  f.append(chip('Heritage ('+d.heritage+')','heritage'));
  f.append(chip('With photographs ('+d.withPhotos+')','photos'));
  const s=el('input',{className:'wsearch',type:'search',placeholder:'Search a temple name, Thai or roman…',value:q});
  s.oninput=()=>{q=s.value.trim().toLowerCase();const g=document.getElementById('wgrid');if(g)paint(g);syncMap();};
  f.append(s);main.append(f);

  const grid=el('div',{className:'wgrid',id:'wgrid'});main.append(grid);paint(grid);

  if((d.sacred||[]).length){
    const h=el('div',{className:'whead'});h.append(document.createTextNode('Not exactly wats'));
    h.append(el('span',{textContent:d.sacred.length+' places of spiritual significance — city pillars, sunken cities, sacred caves, mosques, churches, monumental Buddha images'}));
    main.append(h);
    const sg=el('div',{className:'wgrid'});
    for(const x of d.sacred){
      const c=el('div',{className:'wcard sac'});
      const ph=(x.photos||[])[0];
      if(ph)c.append(el('a',{className:'im',href:ph.source,target:'_blank',rel:'noopener'},[el('img',{src:ph.thumb,loading:'lazy',alt:x.nameRoman||x.name||''})]));
      const b=el('div',{className:'wb'});
      b.append(el('div',{className:'wt'},[el('span',{className:'sbadge',textContent:(x.siteType||'sacred').split(';')[0]}),document.createTextNode(x.nameRoman||x.name||'')]));
      if(x.name&&x.name!==x.nameRoman)b.append(el('div',{className:'wth',textContent:x.name}));
      if(x.heritage)b.append(el('div',{className:'wm',textContent:x.heritage}));
      c.append(b);
      if(ph){const cr=el('div',{className:'cred'});
        cr.append(document.createTextNode(ph.author+' · '));
        cr.append(ph.licenseUrl?el('a',{href:ph.licenseUrl,target:'_blank',rel:'noopener',textContent:ph.license+(ph.publicDomain?' (public domain)':'')}):document.createTextNode(ph.license));
        cr.append(document.createTextNode(' · '));
        cr.append(el('a',{href:ph.source,target:'_blank',rel:'noopener',textContent:'Commons'}));
        c.append(cr);}
      c.onclick=(ev)=>{if(ev.target.closest('a'))return;flyTo(x);};
      sg.append(c);}
    main.append(sg);}

  if(d.download){const dl=el('div',{className:'wdl'});
    dl.append(el('b',{textContent:'Take it with you. '}));
    dl.append(document.createTextNode('An offline app version of this map — installable, works with no signal: '));
    dl.append(el('a',{href:BASE+'wats/app/',textContent:'open the app'}));
    dl.append(document.createTextNode(' · '));
    dl.append(el('a',{href:BASE+'wats/app/wats-offline.html',download:'',textContent:'download the single-file map'}));
    main.append(dl);}

  const lic=el('div',{className:'wlic'});const at=d.attribution||{};
  lic.append(el('b',{textContent:'Sources and licence. '}));
  lic.append(document.createTextNode('Temple locations are derived from OpenStreetMap and are therefore published under the '));
  lic.append(el('a',{href:at.dataUrl||'https://opendatacommons.org/licenses/odbl/1-0/',target:'_blank',rel:'noopener',textContent:'Open Database License (ODbL) 1.0'}));
  lic.append(document.createTextNode(' — share-alike, which is a different licence from the rest of this site. '+(at.facts||'Wikidata, CC0')+'. Photographs are hosted by Wikimedia Commons and are NOT relicensed here: each is credited to its author under its own terms beneath the image.'));
  main.append(lic);}

function paint(grid){grid.textContent='';const items=visible();
  const note=document.getElementById('heronote');
  if(note)note.textContent=items.length.toLocaleString()+' shown';
  if(!items.length){grid.append(el('p',{className:'muted',textContent:'No temple matches.'}));return;}
  for(const w of items){
    const c=el('div',{className:'wcard'+(w.heritage?' her':'')});
    const ph=(w.photos||[])[0];
    if(ph){c.append(el('a',{className:'im',href:ph.source,target:'_blank',rel:'noopener'},[el('img',{src:ph.thumb,loading:'lazy',alt:w.nameRoman||w.name||'temple'})]));}
    const b=el('div',{className:'wb'});
    b.append(el('div',{className:'wt'},[w.heritage?el('span',{className:'wbadge',textContent:'Heritage'}):null,document.createTextNode(w.nameRoman||w.name||'(unnamed)')]));
    if(w.name&&w.name!==w.nameRoman)b.append(el('div',{className:'wth',textContent:w.name}));
    const bits=[];if(w.founded)bits.push('founded '+w.founded);
    bits.push(w.confidence==='verified'?'field-verified':'compiled, unvisited');
    b.append(el('div',{className:'wm',textContent:bits.join(' · ')}));
    c.append(b);
    if(ph){const cr=el('div',{className:'cred'});
      cr.append(document.createTextNode(ph.author+' · '));
      cr.append(ph.licenseUrl?el('a',{href:ph.licenseUrl,target:'_blank',rel:'noopener',textContent:ph.license}):document.createTextNode(ph.license));
      cr.append(document.createTextNode(' · '));
      cr.append(el('a',{href:ph.source,target:'_blank',rel:'noopener',textContent:'Commons'}));
      c.append(cr);}
    c.onclick=(ev)=>{if(ev.target.closest('a'))return;flyTo(w);};
    grid.append(c);}}

// ---- hero map ----
function fc(list){return {type:'FeatureCollection',features:list.filter(w=>w.lat!=null&&w.lng!=null).map(w=>({
  type:'Feature',geometry:{type:'Point',coordinates:[w.lng,w.lat]},
  properties:{id:w.id,her:!!w.heritage,sac:!!w.siteType,kindLabel:(w.siteType||'').split(';')[0],
    name:w.nameRoman||w.name||'',th:(w.name&&w.name!==w.nameRoman)?w.name:'',
    heritage:w.heritage||'',thumb:(w.photos||[])[0]?w.photos[0].thumb:'',
    author:(w.photos||[])[0]?w.photos[0].author:'',lic:(w.photos||[])[0]?w.photos[0].license:'',
    src:(w.photos||[])[0]?w.photos[0].source:''}}))};}

function initMap(){
  const box=document.getElementById('heromap'); if(!box)return;
  map=new maplibregl.Map({container:box,
    style:{version:8,sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,
      attribution:'© OpenStreetMap contributors (ODbL) · photos via Wikimedia Commons'}},
      layers:[{id:'bg',type:'background',paint:{'background-color':'#e9e7e0'}},{id:'osm',type:'raster',source:'osm'}]},
    center:[99.4,18.9],zoom:6.6});
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');
  map.addControl(new maplibregl.FullscreenControl(),'top-right');
  let ready=false;
  // Adding layers is attempted, not gated on isStyleLoaded(). That flag stays
  // false for as long as tiles are outstanding, which on a slow or filtered
  // network is forever — and the map then never draws its markers even though
  // the style itself parsed fine. addSource/addLayer simply throw while the
  // style isn't ready, so we try, swallow, and let the poll retry. Each step is
  // guarded so a partial run can finish on the next tick.
  const build=()=>{
    if(ready)return;
    try{
      if(!map.getSource('wats'))
        map.addSource('wats',{type:'geojson',data:fc(ALL.concat((window.__W||{}).sacred||[]))});
      if(!map.getLayer('w-s'))map.addLayer({id:'w-s',type:'circle',source:'wats',filter:['get','sac'],
        paint:{'circle-radius':['interpolate',['linear'],['zoom'],6,3.6,10,6,14,10],
          'circle-color':'#2f8f88','circle-stroke-color':'#fff','circle-stroke-width':1.6}});
      if(!map.getLayer('w-n'))map.addLayer({id:'w-n',type:'circle',source:'wats',filter:['all',['!',['get','her']],['!',['get','sac']]],
        paint:{'circle-radius':['interpolate',['linear'],['zoom'],6,2.4,10,4,14,7],
          'circle-color':'#c96a2e','circle-stroke-color':'#fff','circle-stroke-width':1,'circle-opacity':.9}});
      if(!map.getLayer('w-h'))map.addLayer({id:'w-h',type:'circle',source:'wats',filter:['all',['get','her'],['!',['get','sac']]],
        paint:{'circle-radius':['interpolate',['linear'],['zoom'],6,4,10,7,14,11],
          'circle-color':'#d4a017','circle-stroke-color':'#fff','circle-stroke-width':2}});
    }catch(e){return;}   // style not parsed yet — the poll will come back
    ready=true;
    for(const id of ['w-n','w-h','w-s']){
      map.on('click',id,e=>popup(e.features[0]));
      map.on('mouseenter',id,()=>map.getCanvas().style.cursor='pointer');
      map.on('mouseleave',id,()=>map.getCanvas().style.cursor='');
    }
    fitAll(); syncMap(); map.resize();
  };
  map.on('style.load',build); map.on('load',()=>{build();map.resize();});
  // some embedded/throttled renderers never deliver those events to late
  // handlers — poll until the style is parsed, then nudge a repaint.
  const t=setInterval(()=>{build();if(ready){map.resize();map.panBy([1,1],{duration:0});map.panBy([-1,-1],{duration:0});clearInterval(t);}},150);
  window.addEventListener('resize',()=>map&&map.resize());
}
function fitAll(){const pts=ALL.concat((window.__W||{}).sacred||[]).filter(w=>w.lat!=null);if(!pts.length||!map)return;
  let n=-90,s=90,e=-180,w2=180;for(const p of pts){n=Math.max(n,p.lat);s=Math.min(s,p.lat);e=Math.max(e,p.lng);w2=Math.min(w2,p.lng);}
  map.fitBounds([[w2,s],[e,n]],{padding:40,duration:0});}
function syncMap(){if(!map||!map.getLayer('w-n'))return;
  const ids=visible().map(w=>w.id);const set=['in',['get','id'],['literal',ids]];
  map.setFilter('w-n',['all',['!',['get','her']],['!',['get','sac']],set]);
  map.setFilter('w-h',['all',['get','her'],['!',['get','sac']],set]);}
function popup(f){const p=f.properties;
  const body='<div class="pop">'+(p.thumb?'<img src="'+p.thumb+'" alt="">':'')+
    '<div class="pb">'+(p.sac?'<span class="pbadge" style="background:#2f8f88;color:#fff">'+esc(p.kindLabel||'sacred site')+'</span><br>':'')+(p.her?'<span class="pbadge">Heritage</span><br>':'')+
    '<div class="pt">'+esc(p.name)+'</div>'+(p.th?'<div class="pth">'+esc(p.th)+'</div>':'')+'</div>'+
    (p.thumb?'<div class="pc">'+esc(p.author)+' · '+esc(p.lic)+' · <a href="'+p.src+'" target="_blank" rel="noopener">Commons</a></div>':'')+'</div>';
  new maplibregl.Popup({offset:12,maxWidth:'240px'}).setLngLat(f.geometry.coordinates).setHTML(body).addTo(map);}
function flyTo(w){if(!map||w.lat==null)return;
  map.flyTo({center:[w.lng,w.lat],zoom:Math.max(map.getZoom(),14),speed:1.4});
  document.getElementById('hero').scrollIntoView({behavior:'smooth',block:'center'});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
load();
</script><button id=tomenu aria-label='Back to menu' onclick="window.scrollTo({top:0,behavior:'smooth'})">&#9650; Menu</button><script>(function(){var b=document.getElementById('tomenu');if(!b)return;var f=function(){b.classList.toggle('show',(window.scrollY||0)>320);};addEventListener('scroll',f,{passive:true});f();})();</script><div id=sharebar aria-label='Share this page'><span class=shlabel>Share</span><button class=shbtn data-sh=native title='Share…' hidden>&#10148;</button><button class=shbtn data-sh=copy title='Copy link'>&#128279;</button><button class=shbtn data-sh=x title='Share on X'>&#120143;</button><button class=shbtn data-sh=fb title='Share on Facebook'>f</button><button class=shbtn data-sh=line title='Share on LINE'>L</button><button class=shbtn data-sh=tg title='Share on Telegram'>&#9992;</button></div><script>(function(){var bar=document.getElementById('sharebar');if(!bar)return;function toast(m){var t=document.createElement('div');t.className='shtoast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},1800);}function links(u,t){return {x:'https://twitter.com/intent/tweet?url='+u+'&text='+t,fb:'https://www.facebook.com/sharer/sharer.php?u='+u,line:'https://social-plugins.line.me/lineit/share?url='+u,tg:'https://t.me/share/url?url='+u+'&text='+t};}function shareUrl(url,title){var u=encodeURIComponent(url),t=encodeURIComponent((title||'').replace(/\s+[—-]\s+wichaa.*$/i,''));return {u:u,t:t};}window.__share=function(url,title){url=url||location.href;title=title||document.title;if(navigator.share){navigator.share({title:title,url:url}).catch(function(){});return;}if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){toast('Link copied');},function(){});}else toast(url);};var nat=bar.querySelector('[data-sh=native]');if(navigator.share&&nat)nat.hidden=false;bar.addEventListener('click',function(e){var el=e.target.closest('[data-sh]');if(!el)return;var k=el.getAttribute('data-sh');var s=shareUrl(location.href,document.title);if(k==='native'){window.__share();return;}if(k==='copy'){if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){toast('Link copied');},function(){toast(location.href);});}else toast(location.href);return;}var m=links(s.u,s.t);if(m[k])window.open(m[k],'_blank','noopener,width=600,height=520');});})();</script></body></html>
