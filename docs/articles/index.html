<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content='width=device-width, initial-scale=1'><meta name='theme-color' content='#1F4E4A'><link rel=icon type='image/svg+xml' href='/Lanna/favicon.svg'><meta name='description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta property='og:type' content='website'><meta property='og:site_name' content='Lanna Manuscript Wiki'><meta property='og:url' content='https://nanobotco.github.io/Lanna/'><meta property='og:title' content='Articles — Lanna Manuscript Wiki'><meta property='og:description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta property='og:image' content='https://nanobotco.github.io/Lanna/og.jpg'><meta property='og:image:width' content='1200'><meta property='og:image:height' content='630'><meta property='og:image:alt' content='Circular yantra from a Lanna manuscript'><meta name='twitter:card' content='summary_large_image'><meta name='twitter:title' content='Articles — Lanna Manuscript Wiki'><meta name='twitter:description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta name='twitter:image' content='https://nanobotco.github.io/Lanna/og.jpg'><title>Articles — Lanna Manuscript Wiki</title><style>
  :root{
    --ink:#141b1a; --muted:#3a4a47; --line:#c9d6d2;
    --teal:#1F4E4A; --teal-ink:#ffffff; --bg:#f4f7f6; --card:#ffffff;
    --focus:#0b5cad; --gold:#8a5a00; --gold-bg:#fbf1dc; --ok:#0f6b3f;
    --prio:#7a1f1f; --prio-bg:#fbe6e6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font:17px/1.55 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  a{color:var(--focus)}
  header{background:linear-gradient(180deg,#245852,#1b4541);color:var(--teal-ink);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 10px #00000022}
  header h1{margin:0;font-size:24px;font-family:var(--serif);letter-spacing:.01em}
  .card>h2:first-child,.card>h2{font-family:var(--serif)}
  header .sub{color:#dfeae7;margin:0}
  header nav{margin-left:auto;display:flex;gap:10px}
  header nav a{color:#fff;text-decoration:none;font-weight:700;border:2px solid #ffffff66;border-radius:8px;padding:8px 14px}
  header nav a:hover{background:#ffffff22}
  main{max-width:1080px;margin:0 auto;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin:0 0 16px}
  button{font:inherit;font-weight:700;color:var(--teal-ink);background:var(--teal);border:2px solid var(--teal);border-radius:8px;padding:10px 16px;cursor:pointer;min-height:44px}
  button.secondary{background:#fff;color:var(--teal)}
  button:hover{background:#163b38;border-color:#163b38}
  button.secondary:hover{background:#eef4f2}
  input[type=text],input[type=search],select,textarea{width:100%;padding:10px 12px;font-size:16px;border:1px solid #6b7f7a;border-radius:8px;color:var(--ink);background:#fff}
  :focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .pill{display:inline-block;font-size:13px;font-weight:700;padding:2px 10px;border-radius:999px;border:1px solid var(--line);background:#eef2f1;color:var(--muted);margin:2px 4px 2px 0}
  .pill.script{background:var(--gold-bg);border-color:#e5cf9a;color:var(--gold)}
  .pill.prio{background:var(--prio-bg);border-color:#e0a3a3;color:var(--prio)}
  .muted{color:var(--muted)}
  .thai{font-size:1.15em}
  .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px;background:#fff}

  .lead{color:var(--muted);margin:0 0 14px}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;margin:0 0 6px}
  .acard{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s,box-shadow .15s}
  .acard:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.09)}
  .acard:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
  .acard .thumb{position:relative;aspect-ratio:4/3;background:#1a1712;overflow:hidden;display:block}
  .acard .thumb img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;transition:transform .2s ease}
  .acard:hover .thumb img{transform:scale(1.04)}
  .acard .mono{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 28%,#1d4b46,#0b2321);color:#bfe8e0;font-size:52px;font-weight:800;letter-spacing:.02em}
  .acard .star{position:absolute;top:8px;left:8px;background:var(--gold);color:#3a2c05;font-weight:800;font-size:11px;border-radius:999px;padding:3px 9px;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .acard .body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:7px;flex:1}
  .acard .top{display:flex;align-items:baseline;gap:8px}
  .acard .name{font-weight:800;font-size:15.5px;color:var(--teal);line-height:1.25}
  .acard .cnt{margin-left:auto;font-weight:800;color:var(--muted);white-space:nowrap;font-size:14px}
  .acard .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:auto}
  .acard .anote{color:var(--muted);font-size:13px;margin:0;line-height:1.4}
  .badge{font-size:12px;font-weight:800;border-radius:999px;padding:2px 10px}
  .badge.ok{background:#e3f1e9;color:var(--ok);border:1px solid #b6dcc6}
  .badge.draft{background:#eaf1f7;color:var(--focus);border:1px solid #b9d1e8}
  .badge.stub{background:var(--gold-bg);color:var(--gold);border:1px solid #e5cf9a}
  .badge.prio{background:var(--prio-bg);color:var(--prio);border:1px solid #e0a3a3}
  .grouphd{margin:20px 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
</style></head><body><script>window.__LANNA_BASE__="/Lanna/";</script><script>
(function(){
  "use strict";
  // ---- Lanna Wiki static shim: run the dynamic viewer on a static host ----------
  // BASE lets the same build work at the domain root ('/') or under a project path
  // ('/Lanna/'). All static targets are resolved through S() so they land correctly.
  var BASE = (window.__LANNA_BASE__ || '/');
  if (BASE.charAt(BASE.length-1) !== '/') BASE += '/';
  function S(p){ return BASE + String(p).replace(/^\//,''); }
  var PLACE = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="260" height="150">'+
    '<rect width="100%" height="100%" fill="#eef2f1"/>'+
    '<text x="50%" y="50%" fill="#3a4a47" font-family="sans-serif" font-size="13" '+
    'text-anchor="middle" dominant-baseline="middle">raw scan — view at source</text></svg>');
  function art(s){ return String(s==null?'':s).replace(/[^A-Za-z0-9]+/g,'_'); }
  function jresp(o){ return new Response(JSON.stringify(o),
    {status:200, headers:{'Content-Type':'application/json; charset=utf-8'}}); }
  var NOARG = {
    '/api/overview':'/api/overview.json','/api/dashboard':'/api/dashboard.json',
    '/api/places':'/api/places.json','/api/lenses':'/api/lenses.json',
    '/api/vocab':'/api/vocab.json','/api/market':'/api/market.json',
    '/api/graph':'/api/graph.json','/api/articles':'/api/articles.json',
    '/api/status':'/api/status.json','/api/manuscripts':'/api/manuscripts.json',
    '/api/graph.jsonld':'/api/graph.jsonld','/api/graph.ttl':'/api/graph.ttl'
  };
  var _fetch = window.fetch ? window.fetch.bind(window) : function(u){return fetch(u);};

  var _docs=null;
  function loadDocs(){ if(_docs) return Promise.resolve(_docs);
    return _fetch(S('/api/searchdocs.json')).then(function(r){return r.json();})
      .then(function(d){_docs=d;return d;}).catch(function(){_docs=[];return [];}); }
  var _thes=null;
  function loadThes(){ if(_thes) return Promise.resolve(_thes);
    return _fetch(S('/api/thesaurus.json')).then(function(r){return r.json();})
      .then(function(t){_thes=t;return t;}).catch(function(){_thes={};return {};}); }
  // mirrors wiki.py _expand_token: query token -> OR-set of cross-language equivalents
  function expand(tok, thes){
    tok=(tok||'').toLowerCase();
    var members={}; members[tok]=1;
    if(tok.length<2) return Object.keys(members);
    for(var key in thes){
      if(tok===key || (tok.length>=3 && (tok.indexOf(key)>=0 || key.indexOf(tok)>=0))){
        var grp=thes[key]; for(var i=0;i<grp.length;i++) members[grp[i]]=1;
      }
    }
    return Object.keys(members);
  }
  function staticSearch(q){
    q=(q||'').trim(); var out={manuscripts:[],articles:[],query:q};
    if(!q) return Promise.resolve(jresp(out));
    return Promise.all([loadDocs(), loadThes()]).then(function(res){
      var docs=res[0], thes=res[1];
      var groups=q.toLowerCase().split(/\s+/).filter(Boolean)
                  .map(function(t){return expand(t, thes);}).filter(function(g){return g.length;});
      if(!groups.length) return jresp(out);
      var scored=[];
      for(var i=0;i<docs.length;i++){
        var d=docs[i], title=(d.ntitle||'').toLowerCase(), body=(d.nbody||'').toLowerCase();
        var ok=true, score=0, pos=null;
        for(var j=0;j<groups.length;j++){
          var g=groups[j], ghit=0;
          for(var m=0;m<g.length;m++){
            var tk=g[m]; if(!tk) continue;
            if(title.indexOf(tk)>=0) ghit+=12;
            var idx=body.indexOf(tk);
            if(idx>=0){ ghit+=Math.min(body.split(tk).length-1,6); if(pos===null||idx<pos)pos=idx; }
          }
          if(ghit===0){ok=false;break;} score+=ghit;
        }
        if(ok) scored.push([score,d,pos]);
      }
      scored.sort(function(a,b){return b[0]-a[0];});
      for(var k=0;k<scored.length;k++){
        var d2=scored[k][1], pos2=scored[k][2]==null?0:scored[k][2];
        var text=d2.nbody||d2.ntitle||'';
        var snip=text.substr(Math.max(0,pos2-60),200).replace(/\s+/g,' ').trim();
        if(d2.kind==='m'){ if(out.manuscripts.length<60)
          out.manuscripts.push({id:parseInt(d2.ref,10),label:d2.label,snippet:snip}); }
        else { if(out.articles.length<60)
          out.articles.push({key:d2.ref,label:d2.label,snippet:snip}); }
      }
      return jresp(out);
    });
  }

  var _scans=null;
  function loadScans(){ if(_scans) return Promise.resolve(_scans);
    return _fetch(S('/api/scans.all.json')).then(function(r){return r.json();})
      .then(function(d){_scans=d.scans||[];return _scans;}).catch(function(){_scans=[];return [];}); }

  // ---- IIIF on-demand images: /img?sha=&w= -> sized library IIIF URL ------------
  // We ship no scan bytes; a {sha -> IIIF url} map lets every page image load from
  // the originating library, resized via the IIIF size parameter. The <img> src
  // setter is synchronous, so images requested before the map arrives get the
  // placeholder and are re-resolved once it loads (IIIF_Q flush).
  var IIIF=null, IIIF_Q=[];
  function iiifSized(u,w){ w=w||1024;
    return String(u).replace('/full/full/0/default.jpg','/full/'+w+',/0/default.jpg'); }
  function flushIIIF(){ var q=IIIF_Q; IIIF_Q=[];
    for(var i=0;i<q.length;i++){ var it=q[i], u=IIIF[it.sha];
      if(u){ try{ desc.set.call(it.el, iiifSized(u,it.w)); }catch(e){} } } }
  function loadIIIF(){ if(IIIF) return Promise.resolve(IIIF);
    return _fetch(S('/api/img-iiif.json')).then(function(r){return r.json();})
      .then(function(m){ IIIF=m||{}; flushIIIF(); return IIIF; })
      .catch(function(){ IIIF={}; flushIIIF(); return IIIF; }); }
  loadIIIF();
  function scansSlice(sp){
    var midp=sp.get('mid'); var mid = midp?parseInt(midp,10):null;
    var offset=parseInt(sp.get('offset')||'0',10)||0;
    var limit=parseInt(sp.get('limit')||'120',10)||120;
    var onlyT=(sp.get('only')==='transcribed');
    return loadScans().then(function(all){
      var pool=all.filter(function(s){
        if(mid!==null && s.id!==mid) return false;
        if(onlyT && !s.transcribed) return false;
        return true;
      });
      return jresp({dbPresent:true, scans:pool.slice(offset,offset+limit),
                    offset:offset, limit:limit, total:pool.length});
    });
  }

  window.fetch = function(input, init){
    init = init || {};
    var url;
    try { url = new URL((typeof input==='string')?input:input.url, location.origin); }
    catch(e){ return _fetch(input, init); }
    if(url.origin !== location.origin) return _fetch(input, init);
    var method = (init.method || (typeof input!=='string' && input.method) || 'GET').toUpperCase();
    var p = url.pathname, sp = url.searchParams;
    if(method !== 'GET') return Promise.resolve(jresp({ok:false, readonly:true}));
    if(p==='/api/search') return staticSearch(sp.get('q'));
    if(p==='/api/gallery' && sp.get('source')==='scans') return scansSlice(sp);
    if(NOARG[p]) return _fetch(S(NOARG[p]), {});
    if(p==='/api/manuscript') return _fetch(S('/api/manuscript/'+encodeURIComponent(sp.get('id'))+'.json'), {});
    if(p==='/api/article')    return _fetch(S('/api/article/'+art(sp.get('s'))+'.json'), {});
    if(p==='/api/gallery'){
      var src=sp.get('source');
      if(src==='scan-index') return _fetch(S('/api/gallery.scan-index.json'), {});
      return _fetch(S('/api/gallery.json'), {});
    }
    if(p==='/pimg') return _fetch(S('/pimg/'+sp.get('mid')+'/'+sp.get('n')+'.png'), {});
    return _fetch(input, init);
  };

  // internal navigation: app links are baked as root-absolute ('/browse', '/m?id=…').
  // Under a project subpath they must be re-rooted at BASE. A capture-phase click
  // handler does this for every link, however it was created.
  document.addEventListener('click', function(ev){
    if(ev.defaultPrevented || ev.button!==0 || ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.altKey) return;
    var a = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
    if(!a) return;
    if(a.target==='_blank') return;
    var href=a.getAttribute('href');
    if(!href || href.charAt(0)!=='/' || href.charAt(1)==='/') return;  // only root-absolute, not protocol-relative
    if(BASE!=='/' && href.indexOf(BASE)===0) return;                   // already re-rooted
    ev.preventDefault();
    location.href = S(href);
  }, true);

  // rewrite <img> src (Object.assign in el() sets the .src property, so this catches it)
  try {
    var proto=HTMLImageElement.prototype;
    var desc=Object.getOwnPropertyDescriptor(proto,'src');
    Object.defineProperty(proto,'src',{configurable:true,enumerable:true,
      get:function(){return desc.get.call(this);},
      set:function(v){
        try{
          var u=new URL(v, location.origin);
          if(u.origin===location.origin){
            if(u.pathname==='/pimg'){
              v=S('/pimg/'+u.searchParams.get('mid')+'/'+u.searchParams.get('n')+'.png');
            } else if(u.pathname==='/img'){
              var sha=u.searchParams.get('sha');
              var w=parseInt(u.searchParams.get('w')||'0',10)||0;
              if(sha && IIIF && IIIF[sha]){ v=iiifSized(IIIF[sha], w); }
              else if(sha && IIIF===null){ IIIF_Q.push({el:this, sha:sha, w:w}); v=PLACE; }
              else { v=PLACE; }
            }
          }
        }catch(e){}
        desc.set.call(this,v);
      }});
  } catch(e){}
})();
</script><header><div><h1>Articles</h1><p class=sub>Synthesised from the collection · facts stay live, prose is authored</p></div><nav><a href='/'>Overview</a><a href='/browse'>Browse</a><a href='/market'>Living Tradition</a><a href='/articles'>Articles</a><a href='/findings'>Discoveries</a><a href='/activity'>Activity</a></nav></header><main id=main><p class=muted>Loading…</p></main><script>
const el=(t,p={},k=[])=>{const e=document.createElement(t);Object.assign(e,p);for(const c of [].concat(k))if(c!=null&&c!==false)e.append(c);return e;};
function monogram(label){const m=(label||'?').replace(/^[^\p{L}\p{N}]+/u,'');return (m[0]||'?').toUpperCase();}
function card(a){
  const art='/a?s='+encodeURIComponent(a.key);
  const c=el('a',{className:'acard',href:art,'aria-label':a.label+' — '+a.count.toLocaleString()+' manuscripts'});
  const thumb=el('div',{className:'thumb'});
  if(a.image){
    const img=el('img',{src:a.image.src,alt:'',loading:'lazy'});
    if(a.image.caption)img.title=a.image.caption;
    thumb.append(img);
    if(a.image.starred)thumb.append(el('span',{className:'star',textContent:'★ curated'}));
  }else{
    thumb.append(el('div',{className:'mono',textContent:monogram(a.label)}));
  }
  c.append(thumb);
  const body=el('div',{className:'body'});
  const top=el('div',{className:'top'});
  top.append(el('span',{className:'name',textContent:(a.priority?'★ ':'')+a.label}));
  top.append(el('span',{className:'cnt',textContent:a.count.toLocaleString()}));
  body.append(top);
  if(a.note)body.append(el('p',{className:'anote',textContent:a.note}));
  const meta=el('div',{className:'meta'});
  const st=a.hasArticle?(a.status==='published'?['ok','Article']:['draft','Draft']):['stub','Stub'];
  meta.append(el('span',{className:'badge '+st[0],textContent:st[1]}));
  if(a.priority)meta.append(el('span',{className:'badge prio',textContent:'priority'}));
  body.append(meta);
  c.append(body);
  return c;}
async function load(){const d=await (await fetch('/api/articles')).json();const main=document.getElementById('main');main.textContent='';
  if(!d.dbPresent){main.append(el('div',{className:'empty'},[el('p',{textContent:'No catalog database yet.'})]));return;}
  const intro=el('div',{className:'card'});
  intro.append(el('p',{className:'lead',style:'margin:0'},[document.createTextNode('Every genre — plus the esoteric subjects and sub-genres we\u2019ve begun documenting — has an article that reads its own slice of the collection: counts, places, scripts and dates are recomputed live, so they never go stale as the crawl grows. Each card shows a representative folio pulled straight from the collection — a diagram or described page where we have one, otherwise a scanned leaf; a '),el('span',{className:'badge stub',textContent:'Stub'}),document.createTextNode(' has live facts but awaits written analysis, an '),el('span',{className:'badge ok',textContent:'Article'}),document.createTextNode(' has authored prose. Listed research-priority first.')]));
  main.append(intro);
  const prio=d.articles.filter(a=>a.priority),rest=d.articles.filter(a=>!a.priority);
  if(prio.length){main.append(el('div',{className:'grouphd',textContent:'Research priority (wichaa)'}));const g=el('div',{className:'agrid'});for(const a of prio)g.append(card(a));main.append(g);}
  if(rest.length){main.append(el('div',{className:'grouphd',textContent:'The rest of the collection'}));const g=el('div',{className:'agrid'});for(const a of rest)g.append(card(a));main.append(g);}
}
load();
</script></body></html>
