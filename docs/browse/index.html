<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content='width=device-width, initial-scale=1'><meta name='theme-color' content='#1F4E4A'><link rel=icon type='image/svg+xml' href='/favicon.svg'><meta name='description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta property='og:type' content='website'><meta property='og:site_name' content='Lanna Manuscript Wiki'><meta property='og:title' content='Lanna Manuscript Wiki'><meta property='og:description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta property='og:image' content='https://nanobotco.github.io/Lanna/og.jpg'><meta property='og:image:width' content='1200'><meta property='og:image:height' content='630'><meta property='og:image:alt' content='Circular yantra from a Lanna manuscript'><meta name='twitter:card' content='summary_large_image'><meta name='twitter:title' content='Lanna Manuscript Wiki'><meta name='twitter:description' content='A living archive of Lanna manuscripts and the wichaa tradition — divination, astrology, and sacred practice, from palm-leaf folios to present-day amulet commerce, on one continuous timeline.'><meta name='twitter:image' content='https://nanobotco.github.io/Lanna/og.jpg'><title>Lanna Manuscript Wiki</title><style>
  :root{
    --ink:#141b1a; --muted:#3a4a47; --line:#c9d6d2;
    --teal:#1F4E4A; --teal-ink:#ffffff; --bg:#f4f7f6; --card:#ffffff;
    --focus:#0b5cad; --gold:#8a5a00; --gold-bg:#fbf1dc; --ok:#0f6b3f;

    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font:17px/1.55 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  a{color:var(--focus)}
  header{background:linear-gradient(180deg,#245852,#1b4541);color:var(--teal-ink);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 10px #00000022}
  header h1{margin:0;font-size:24px;font-family:var(--serif);letter-spacing:.01em}
  .card>h2:first-child,.card>h2{font-family:var(--serif)}
  header .sub{color:#dfeae7;margin:0}
  header nav{margin-left:auto;display:flex;gap:10px}
  header nav a{color:#fff;text-decoration:none;font-weight:700;border:2px solid #ffffff66;border-radius:8px;padding:8px 14px}
  header nav a:hover{background:#ffffff22}
  main{max-width:1080px;margin:0 auto;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin:0 0 16px}
  button{font:inherit;font-weight:700;color:var(--teal-ink);background:var(--teal);border:2px solid var(--teal);border-radius:8px;padding:10px 16px;cursor:pointer;min-height:44px}
  button.secondary{background:#fff;color:var(--teal)}

  button.secondary:hover{background:#eef4f2}
  input[type=text],input[type=search],select,textarea{width:100%;padding:10px 12px;font-size:16px;border:1px solid #6b7f7a;border-radius:8px;color:var(--ink);background:#fff}
  :focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .pill{display:inline-block;font-size:13px;font-weight:700;padding:2px 10px;border-radius:999px;border:1px solid var(--line);background:#eef2f1;color:var(--muted);margin:2px 4px 2px 0}
  .pill.script{background:var(--gold-bg);border-color:#e5cf9a;color:var(--gold)}
  .pill.prio{background:var(--prio-bg);border-color:#e0a3a3;color:var(--prio)}
  .muted{color:var(--muted)}
  .thai{font-size:1.15em}
  .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:10px;background:#fff}

  .layout{display:grid;grid-template-columns:280px 1fr;gap:18px}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
  .facets h3{margin:14px 0 6px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}

  .result:hover{border-color:var(--teal);box-shadow:0 1px 4px #0001}

  .result h2{margin:0 0 4px;font-size:19px;color:var(--teal)}

  .snippet mark{background:#ffe9a8;color:inherit;padding:0 1px;border-radius:2px}
  .artmatches{margin:0 0 14px;font-size:15px}
  .artmatches:empty{display:none}
  .artmatches .aml{font-weight:700;color:var(--muted);margin-right:6px}
  .artmatches .amlink{display:inline-block;margin:0 10px 6px 0;font-weight:700;text-decoration:none;color:var(--teal)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input[type=search]{flex:1;min-width:220px}
  .count{font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
  .chips:empty{display:none}

  .chip button{background:#ffffff33;color:#fff;border:none;border-radius:999px;min-height:22px;height:22px;width:22px;padding:0;font-size:15px;line-height:1;cursor:pointer}
  .chip button:hover{background:#ffffff55}
  .facets .more{background:none;border:none;color:var(--focus);font-weight:700;padding:4px 0;cursor:pointer;min-height:auto;font-size:14px}
</style></head><body><script>window.__LANNA_BASE__="/Lanna/";</script><script>
(function(){
  "use strict";
  // ---- Lanna Wiki static shim: run the dynamic viewer on a static host ----------
  // BASE lets the same build work at the domain root ('/') or under a project path
  // ('/Lanna/'). All static targets are resolved through S() so they land correctly.
  var BASE = (window.__LANNA_BASE__ || '/');
  if (BASE.charAt(BASE.length-1) !== '/') BASE += '/';
  function S(p){ return BASE + String(p).replace(/^\//,''); }
  var PLACE = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="260" height="150">'+
    '<rect width="100%" height="100%" fill="#eef2f1"/>'+
    '<text x="50%" y="50%" fill="#3a4a47" font-family="sans-serif" font-size="13" '+
    'text-anchor="middle" dominant-baseline="middle">raw scan — view at source</text></svg>');
  function art(s){ return String(s==null?'':s).replace(/[^A-Za-z0-9]+/g,'_'); }
  function jresp(o){ return new Response(JSON.stringify(o),
    {status:200, headers:{'Content-Type':'application/json; charset=utf-8'}}); }
  var NOARG = {
    '/api/overview':'/api/overview.json','/api/dashboard':'/api/dashboard.json',
    '/api/places':'/api/places.json','/api/lenses':'/api/lenses.json',
    '/api/vocab':'/api/vocab.json','/api/market':'/api/market.json',
    '/api/graph':'/api/graph.json','/api/articles':'/api/articles.json',
    '/api/status':'/api/status.json','/api/manuscripts':'/api/manuscripts.json',
    '/api/graph.jsonld':'/api/graph.jsonld','/api/graph.ttl':'/api/graph.ttl'
  };
  var _fetch = window.fetch ? window.fetch.bind(window) : function(u){return fetch(u);};

  var _docs=null;
  function loadDocs(){ if(_docs) return Promise.resolve(_docs);
    return _fetch(S('/api/searchdocs.json')).then(function(r){return r.json();})
      .then(function(d){_docs=d;return d;}).catch(function(){_docs=[];return [];}); }
  var _thes=null;
  function loadThes(){ if(_thes) return Promise.resolve(_thes);
    return _fetch(S('/api/thesaurus.json')).then(function(r){return r.json();})
      .then(function(t){_thes=t;return t;}).catch(function(){_thes={};return {};}); }
  // mirrors wiki.py _expand_token: query token -> OR-set of cross-language equivalents
  function expand(tok, thes){
    tok=(tok||'').toLowerCase();
    var members={}; members[tok]=1;
    if(tok.length<2) return Object.keys(members);
    for(var key in thes){
      if(tok===key || (tok.length>=3 && (tok.indexOf(key)>=0 || key.indexOf(tok)>=0))){
        var grp=thes[key]; for(var i=0;i<grp.length;i++) members[grp[i]]=1;
      }
    }
    return Object.keys(members);
  }
  function staticSearch(q){
    q=(q||'').trim(); var out={manuscripts:[],articles:[],query:q};
    if(!q) return Promise.resolve(jresp(out));
    return Promise.all([loadDocs(), loadThes()]).then(function(res){
      var docs=res[0], thes=res[1];
      var groups=q.toLowerCase().split(/\s+/).filter(Boolean)
                  .map(function(t){return expand(t, thes);}).filter(function(g){return g.length;});
      if(!groups.length) return jresp(out);
      var scored=[];
      for(var i=0;i<docs.length;i++){
        var d=docs[i], title=(d.ntitle||'').toLowerCase(), body=(d.nbody||'').toLowerCase();
        var ok=true, score=0, pos=null;
        for(var j=0;j<groups.length;j++){
          var g=groups[j], ghit=0;
          for(var m=0;m<g.length;m++){
            var tk=g[m]; if(!tk) continue;
            if(title.indexOf(tk)>=0) ghit+=12;
            var idx=body.indexOf(tk);
            if(idx>=0){ ghit+=Math.min(body.split(tk).length-1,6); if(pos===null||idx<pos)pos=idx; }
          }
          if(ghit===0){ok=false;break;} score+=ghit;
        }
        if(ok) scored.push([score,d,pos]);
      }
      scored.sort(function(a,b){return b[0]-a[0];});
      for(var k=0;k<scored.length;k++){
        var d2=scored[k][1], pos2=scored[k][2]==null?0:scored[k][2];
        var text=d2.nbody||d2.ntitle||'';
        var snip=text.substr(Math.max(0,pos2-60),200).replace(/\s+/g,' ').trim();
        if(d2.kind==='m'){ if(out.manuscripts.length<60)
          out.manuscripts.push({id:parseInt(d2.ref,10),label:d2.label,snippet:snip}); }
        else { if(out.articles.length<60)
          out.articles.push({key:d2.ref,label:d2.label,snippet:snip}); }
      }
      return jresp(out);
    });
  }

  var _scans=null;
  function loadScans(){ if(_scans) return Promise.resolve(_scans);
    return _fetch(S('/api/scans.all.json')).then(function(r){return r.json();})
      .then(function(d){_scans=d.scans||[];return _scans;}).catch(function(){_scans=[];return [];}); }
  function scansSlice(sp){
    var midp=sp.get('mid'); var mid = midp?parseInt(midp,10):null;
    var offset=parseInt(sp.get('offset')||'0',10)||0;
    var limit=parseInt(sp.get('limit')||'120',10)||120;
    var onlyT=(sp.get('only')==='transcribed');
    return loadScans().then(function(all){
      var pool=all.filter(function(s){
        if(mid!==null && s.id!==mid) return false;
        if(onlyT && !s.transcribed) return false;
        return true;
      });
      return jresp({dbPresent:true, scans:pool.slice(offset,offset+limit),
                    offset:offset, limit:limit, total:pool.length});
    });
  }

  window.fetch = function(input, init){
    init = init || {};
    var url;
    try { url = new URL((typeof input==='string')?input:input.url, location.origin); }
    catch(e){ return _fetch(input, init); }
    if(url.origin !== location.origin) return _fetch(input, init);
    var method = (init.method || (typeof input!=='string' && input.method) || 'GET').toUpperCase();
    var p = url.pathname, sp = url.searchParams;
    if(method !== 'GET') return Promise.resolve(jresp({ok:false, readonly:true}));
    if(p==='/api/search') return staticSearch(sp.get('q'));
    if(p==='/api/gallery' && sp.get('source')==='scans') return scansSlice(sp);
    if(NOARG[p]) return _fetch(S(NOARG[p]), {});
    if(p==='/api/manuscript') return _fetch(S('/api/manuscript/'+encodeURIComponent(sp.get('id'))+'.json'), {});
    if(p==='/api/article')    return _fetch(S('/api/article/'+art(sp.get('s'))+'.json'), {});
    if(p==='/api/gallery'){
      var src=sp.get('source');
      if(src==='scan-index') return _fetch(S('/api/gallery.scan-index.json'), {});
      return _fetch(S('/api/gallery.json'), {});
    }
    if(p==='/pimg') return _fetch(S('/pimg/'+sp.get('mid')+'/'+sp.get('n')+'.png'), {});
    return _fetch(input, init);
  };

  // internal navigation: app links are baked as root-absolute ('/browse', '/m?id=…').
  // Under a project subpath they must be re-rooted at BASE. A capture-phase click
  // handler does this for every link, however it was created.
  document.addEventListener('click', function(ev){
    if(ev.defaultPrevented || ev.button!==0 || ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.altKey) return;
    var a = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
    if(!a) return;
    if(a.target==='_blank') return;
    var href=a.getAttribute('href');
    if(!href || href.charAt(0)!=='/' || href.charAt(1)==='/') return;  // only root-absolute, not protocol-relative
    if(BASE!=='/' && href.indexOf(BASE)===0) return;                   // already re-rooted
    ev.preventDefault();
    location.href = S(href);
  }, true);

  // rewrite <img> src (Object.assign in el() sets the .src property, so this catches it)
  try {
    var proto=HTMLImageElement.prototype;
    var desc=Object.getOwnPropertyDescriptor(proto,'src');
    Object.defineProperty(proto,'src',{configurable:true,enumerable:true,
      get:function(){return desc.get.call(this);},
      set:function(v){
        try{
          var u=new URL(v, location.origin);
          if(u.origin===location.origin){
            if(u.pathname==='/pimg'){
              v=S('/pimg/'+u.searchParams.get('mid')+'/'+u.searchParams.get('n')+'.png');
            } else if(u.pathname==='/img'){ v=PLACE; }
          }
        }catch(e){}
        desc.set.call(this,v);
      }});
  } catch(e){}
})();
</script><header><div><h1>Lanna Manuscript Wiki</h1><p class=sub>Browse the crawled manuscript catalog</p></div><nav><a href='/'>Overview</a><a href='/browse'>Browse</a><a href='/gallery'>Plates</a><a href='/market'>Market</a><a href='/vocab'>Vocabulary</a><a href='/articles'>Articles</a><a href='/map'>Map</a><a href='/graph'>Graph</a><a href='/activity'>Activity</a></nav></header><main><div class=toolbar><input id=search type=search placeholder='Search title, genre, temple, province, ID…' aria-label='Search'><select id=sort aria-label=Sort><option value=priority>Sort: Priority first</option><option value=title>Sort: Title A–Z</option><option value=date>Sort: Date</option><option value=images>Sort: Most images</option></select><button class=secondary id=clear>Clear filters</button><span class=count id=count></span></div><div id=chips class=chips aria-label='Active filters'></div><div id=artmatches class=artmatches aria-label='Matching articles'></div><div class=layout><aside class='card facets' id=facets aria-label=Filters></aside><section id=results aria-live=polite></section></div></main><script>
const FL={priority:'Research priority',genre:'Genre',script:'Script',language:'Language',material:'Material',century:'Century',province:'Province',temple:'Temple',source:'Source'};
const CAP=12; // long facet lists collapse to this many until "show all"
let ALL=[],FACETS={},LABELS={},active={},expanded={};
let SEARCH=null,searchT=null;  // server full-text results {order,snip,articles}
const el=(t,p={},k=[])=>{const e=document.createElement(t);Object.assign(e,p);for(const c of [].concat(k))if(c!=null&&c!==false)e.append(c);return e;};
function fromURL(){const q=new URLSearchParams(location.search);active={};
  for(const key of Object.keys(FL)){const vals=q.getAll(key);if(vals.length)active[key]=new Set(vals);}
  const term=q.get('q');if(term)document.getElementById('search').value=term;
  const sort=q.get('sort');if(sort)document.getElementById('sort').value=sort;}
function toURL(){const q=new URLSearchParams();
  for(const key of Object.keys(active))for(const v of (active[key]||[]))q.append(key,v);
  const term=document.getElementById('search').value.trim();if(term)q.set('q',term);
  const sort=document.getElementById('sort').value;if(sort&&sort!=='priority')q.set('sort',sort);
  const s=q.toString();history.replaceState(null,'',s?'?'+s:location.pathname);}
async function load(){const d=await (await fetch('/api/manuscripts')).json();ALL=d.items;FACETS=d.facets;LABELS=d.labels;
  if(!d.dbPresent){document.getElementById('results').innerHTML='';document.getElementById('results').append(el('div',{className:'empty'},[el('p',{textContent:'No catalog yet — crawler/catalog.db hasn’t been created.'}),el('p',{},[document.createTextNode('Run the crawler, then reload. See '),el('a',{href:'/status',textContent:'Crawl status'}),document.createTextNode('.')])]));document.getElementById('count').textContent='';return;}
  fromURL();renderFacets();if(document.getElementById('search').value.trim().length>=2)runSearch();else apply();}
function labelFor(key,val){return (LABELS[key]&&LABELS[key][val])||val;}
function toggle(key,val,on){active[key]=active[key]||new Set();on?active[key].add(val):active[key].delete(val);if(!active[key].size)delete active[key];renderFacets();apply();}
function renderFacets(){const box=document.getElementById('facets');box.textContent='';let any=false;
  for(const key of Object.keys(FL)){let vals=Object.entries(FACETS[key]||{}).sort((a,b)=>b[1]-a[1]);if(!vals.length)continue;any=true;
    box.append(el('h3',{textContent:FL[key]}));
    const sel=active[key]||new Set();const show=expanded[key]?vals:vals.slice(0,CAP);
    // always include any selected value even if beyond the cap
    for(const [val,n] of vals)if(sel.has(val)&&!show.some(x=>x[0]===val))show.push([val,n]);
    for(const [val,n] of show){const cb=el('input',{type:'checkbox'});cb.value=val;cb.checked=sel.has(val);
      cb.onchange=()=>toggle(key,val,cb.checked);
      box.append(el('label',{},[cb,document.createTextNode(labelFor(key,val)),el('span',{className:'n',textContent:n})]));}
    if(vals.length>CAP){const more=el('button',{className:'more',textContent:expanded[key]?'– show fewer':'+ show all '+vals.length});
      more.onclick=()=>{expanded[key]=!expanded[key];renderFacets();};box.append(more);}}
  if(!any)box.append(el('p',{className:'muted',textContent:'No facets yet.'}));}
function renderChips(){const box=document.getElementById('chips');box.textContent='';
  for(const key of Object.keys(active))for(const val of active[key]){
    const chip=el('span',{className:'chip'},[document.createTextNode(FL[key]+': '+labelFor(key,val))]);
    const x=el('button',{textContent:'×','aria-label':'Remove filter '+labelFor(key,val)});x.onclick=()=>toggle(key,val,false);
    chip.append(x);box.append(chip);}}
function matches(it){for(const key of Object.keys(active)){const set=active[key];if(!set||!set.size)continue;
    let field;if(key==='priority')field=[it.priority?'Research priority':''];else field=[it[key]];
    if(![...set].some(v=>field.includes(v)))return false;}return true;}
function cmp(sort){return (a,b)=>{if(sort==='images')return b.imageCount-a.imageCount;if(sort==='date')return String(a.date).localeCompare(String(b.date));if(sort==='title')return a.title.localeCompare(b.title);return (a.priority?0:1)-(b.priority?0:1)||a.title.localeCompare(b.title);};}
function onSearchInput(){clearTimeout(searchT);const term=document.getElementById('search').value.trim();
  if(term.length<2){SEARCH=null;apply();return;}
  searchT=setTimeout(runSearch,180);}
async function runSearch(){const term=document.getElementById('search').value.trim();
  if(term.length<2){SEARCH=null;apply();return;}
  try{const d=await (await fetch('/api/search?q='+encodeURIComponent(term))).json();
    if(document.getElementById('search').value.trim()!==term)return; // a newer keystroke won
    SEARCH={order:d.manuscripts.map(x=>x.id),snip:Object.fromEntries(d.manuscripts.map(x=>[x.id,x.snippet])),articles:d.articles||[]};
  }catch(e){SEARCH=null;}
  apply();}
function renderArtMatches(term){const box=document.getElementById('artmatches');box.textContent='';
  if(!term||!SEARCH||!SEARCH.articles.length)return;
  box.append(el('span',{className:'aml',textContent:'Articles: '}));
  for(const a of SEARCH.articles.slice(0,8))box.append(el('a',{className:'amlink',href:'/a?s='+encodeURIComponent(a.key),textContent:a.label}));}
function apply(){const term=document.getElementById('search').value.trim();const sort=document.getElementById('sort').value;
  toURL();renderChips();renderArtMatches(term);
  let out=ALL.filter(matches),fts=false;
  if(term){
    if(SEARCH){fts=true;const rank=new Map(SEARCH.order.map((id,i)=>[id,i]));
      out=out.filter(it=>rank.has(it.id));
      out.sort(sort==='priority'?(a,b)=>rank.get(a.id)-rank.get(b.id):cmp(sort));}
    else{const t=term.toLowerCase();
      out=out.filter(it=>[it.title,it.titleThai,it.titleTranslit,it.genreRaw,it.genreLabel,it.temple,it.province,it.sourceIdentifier,it.source].join(' ').toLowerCase().includes(t));
      out.sort(cmp(sort));}
  } else out.sort(cmp(sort));
  document.getElementById('count').textContent=out.length+' of '+ALL.length+' manuscripts'+(fts?' · full-text':'');
  const box=document.getElementById('results');box.textContent='';
  if(!out.length){box.append(el('div',{className:'empty',textContent:'No manuscripts match these filters.'}));return;}
  for(const it of out){const a=el('a',{className:'result'+(it.priority?' prio':''),href:'/m?id='+it.id});
    a.append(el('h2',{textContent:it.title}));
    if(it.titleThai)a.append(el('div',{className:'meta thai',textContent:it.titleThai}));
    const bits=[it.source,it.temple||it.province,it.date,it.extentPages?it.extentPages+' folios':''].filter(Boolean).join('  ·  ');
    if(bits)a.append(el('div',{className:'meta',textContent:bits}));
    if(fts&&SEARCH.snip[it.id]){const sn=el('div',{className:'snippet'});sn.innerHTML=SEARCH.snip[it.id];a.append(sn);}
    const tags=el('div');
    if(it.priority)tags.append(el('span',{className:'pill prio',textContent:'★ '+it.genreLabel}));
    else tags.append(el('span',{className:'pill',textContent:it.genreLabel}));
    if(it.scriptLabel)tags.append(el('span',{className:'pill script',textContent:it.scriptLabel}));
    if(it.materialLabel)tags.append(el('span',{className:'pill',textContent:it.materialLabel}));
    tags.append(el('span',{className:'pill',textContent:(it.imageCount||0)+' images'}));
    a.append(tags);box.append(a);}}
